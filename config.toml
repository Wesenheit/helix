theme = "papercolor-dark" 

[editor]
line-number = "absolute"       
mouse = true                   
middle-click-paste = false 
scroll-lines = 3              
shell = ["zsh", "-c"]
auto-save = true               
idle-timeout = 250
completion-trigger-len = 2
auto-completion = true
auto-format = true
auto-pairs = true
color-modes = true
cursorline = true
gutters = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]

[editor.statusline]
left = ["mode", "spinner", "file-name"]
center = ["file-type"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending"]

[keys.normal]
S-f = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
S-g = ":sh tmux display-popup -d \"#{pane_current_path}\" -w 90% -h 90% -E lazygit"
C-s = ":write"
C-q = ":quit"
C-o = "file_picker"
C-n = ":new"
C-w = ":buffer-close"
C-d = ":theme papercolor-dark"
C-l = ":theme papercolor-light"
S-y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]
